# Netlify configuration for Tre Coleman site

[build]
  # Publish directory (root of the site)
  publish = "."

  # Install dependencies for functions
  command = "npm install"

  # Functions directory
  functions = "netlify/functions"

# Functions configuration
[functions]
  # Node.js bundler
  node_bundler = "esbuild"
  # Include node_modules in the function bundle
  included_files = ["node_modules/**"]

# Redirect rules
[[redirects]]
  # Stripe success redirect
  from = "/success"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  # Stripe cancel redirect
  from = "/cancel"
  to = "/catering-profit.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# MIME types for course downloads
[[headers]]
  for = "/**/*.xlsx"
  [headers.values]
    Content-Type = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    Content-Disposition = "attachment"

[[headers]]
  for = "/**/*.docx"
  [headers.values]
    Content-Type = "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    Content-Disposition = "attachment"

[[headers]]
  for = "/**/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "attachment"


