<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const BENCHMARKS = {
      restaurant: { foodCostIdeal: 30, laborIdeal: 30, compsPct: 2, weeklyRevenuePerSeat: 150 },
      foodtruck: { foodCostIdeal: 32, fuelCommissaryPct: 8, eventsPerWeekIdeal: 5 },
      catering: { foodCostIdeal: 30, laborIdeal: 28, conversionIdeal: 65, marginIdeal: 38 },
      contractor: { laborIdeal: 35, materialsIdeal: 32, overheadIdeal: 12, netMarginIdeal: 18 },
      retail: { cogsIdeal: 50, laborIdeal: 18, shrinkIdeal: 1.5, conversionIdeal: 30 },
    };

    const FIELDS = {
      restaurant: [
        { key: "weeklyRevenue", label: "Weekly Gross Sales", hint: "Total sales before any deductions", prefix: "$" },
        { key: "foodCost", label: "Food Cost %", hint: "Cost of goods sold as % of sales", suffix: "%" },
        { key: "laborCost", label: "Labor Cost %", hint: "All labor including management", suffix: "%" },
        { key: "avgTicket", label: "Average Ticket", hint: "Per-guest average (excluding tax/tip)", prefix: "$" },
        { key: "compsVoids", label: "Comps & Voids %", hint: "As a % of total sales", suffix: "%" },
        { key: "seatingCapacity", label: "Seating Capacity", hint: "Total indoor + outdoor seats" },
      ],
      foodtruck: [
        { key: "weeklyRevenue", label: "Weekly Gross Revenue", hint: "Average across all events", prefix: "$" },
        { key: "foodCost", label: "Food Cost %", hint: "COGS as % of revenue", suffix: "%" },
        { key: "eventsPerWeek", label: "Events Per Week", hint: "Average weekly bookings" },
        { key: "avgEventRevenue", label: "Avg Revenue Per Event", hint: "Gross sales per event", prefix: "$" },
        { key: "fuelCommissary", label: "Weekly Fuel + Commissary", hint: "All vehicle and kitchen rental costs", prefix: "$" },
      ],
      catering: [
        { key: "monthlyRevenue", label: "Monthly Catering Revenue", hint: "Average monthly gross", prefix: "$" },
        { key: "foodCost", label: "Food Cost %", hint: "Ingredients as % of event revenue", suffix: "%" },
        { key: "laborCost", label: "Labor Cost %", hint: "Staff + your time as % of revenue", suffix: "%" },
        { key: "inquiryConversion", label: "Inquiry Conversion Rate", hint: "% of inquiries you actually close", suffix: "%" },
        { key: "avgEventSize", label: "Average Guest Count", hint: "Per event average" },
        { key: "pricePerHead", label: "Average Price Per Head", hint: "All-in per person pricing", prefix: "$" },
      ],
      contractor: [
        { key: "monthlyRevenue", label: "Monthly Revenue", hint: "Total billed revenue", prefix: "$" },
        { key: "laborCost", label: "Labor Cost %", hint: "All labor as % of revenue", suffix: "%" },
        { key: "materialsCost", label: "Materials Cost %", hint: "Materials & subs as % of revenue", suffix: "%" },
        { key: "overhead", label: "Overhead %", hint: "Insurance, equipment, admin", suffix: "%" },
        { key: "avgJobValue", label: "Avg Job Value", hint: "Average per completed job", prefix: "$" },
        { key: "unbilledHours", label: "Unbilled Hours/Week", hint: "Hours worked not billed to a job" },
      ],
      retail: [
        { key: "monthlyRevenue", label: "Monthly Revenue", hint: "Total gross sales", prefix: "$" },
        { key: "cogs", label: "Cost of Goods %", hint: "Inventory cost as % of sales", suffix: "%" },
        { key: "laborCost", label: "Labor Cost %", hint: "All staff labor as % of revenue", suffix: "%" },
        { key: "shrink", label: "Shrink %", hint: "Theft, damage, waste as % of sales", suffix: "%" },
        { key: "avgTransaction", label: "Avg Transaction", hint: "Average sale per customer", prefix: "$" },
        { key: "returnsRate", label: "Returns Rate %", hint: "Returns as % of sales", suffix: "%" },
      ],
    };

    const SEGMENT_INFO = {
      restaurant: { icon: "🍽️", label: "Restaurant", desc: "Full-service, fast casual, QSR" },
      foodtruck: { icon: "🚚", label: "Food Truck", desc: "Mobile & event operations" },
      catering: { icon: "🥂", label: "Catering", desc: "Event, corporate & drop-off" },
      contractor: { icon: "🔨", label: "Contractor", desc: "Trades, construction, home services" },
      retail: { icon: "🛍️", label: "Retail", desc: "Storefront & product-based" },
    };

    function calcScore(segment, vals) {
      const leaks = [];
      if (segment === "restaurant") {
        const { weeklyRevenue, foodCost, laborCost, compsVoids, avgTicket, seatingCapacity } = vals;
        const rev = parseFloat(weeklyRevenue) || 0;
        const fc = parseFloat(foodCost) || 0;
        const lc = parseFloat(laborCost) || 0;
        const cv = parseFloat(compsVoids) || 0;
        const ticket = parseFloat(avgTicket) || 0;
        const fcDelta = fc - BENCHMARKS.restaurant.foodCostIdeal;
        const fcScore = Math.min(100, Math.max(0, fcDelta * 4));
        leaks.push({ category: "Food Cost", score: fcScore, severity: fcScore > 50 ? "high" : fcScore > 20 ? "medium" : "low", title: "Food Cost Leak", desc: fc > 0 ? `Your food cost of ${fc}% is ${fcDelta > 0 ? `${fcDelta.toFixed(1)}% above` : "within"} the industry benchmark of ${BENCHMARKS.restaurant.foodCostIdeal}%.` : "Enter your food cost % to analyze this area.", impact: rev * 4.33 * (Math.max(0, fcDelta) / 100) });
        const lcDelta = lc - BENCHMARKS.restaurant.laborIdeal;
        const lcScore = Math.min(100, Math.max(0, lcDelta * 4));
        leaks.push({ category: "Labor Efficiency", score: lcScore, severity: lcScore > 50 ? "high" : lcScore > 20 ? "medium" : "low", title: "Labor Cost Overrun", desc: lc > 0 ? `Labor at ${lc}% is ${lcDelta > 0 ? `${lcDelta.toFixed(1)}% over target` : "within range"} (benchmark: ${BENCHMARKS.restaurant.laborIdeal}%).` : "Enter your labor % to analyze this area.", impact: rev * 4.33 * (Math.max(0, lcDelta) / 100) });
        const cvDelta = cv - BENCHMARKS.restaurant.compsPct;
        const cvScore = Math.min(100, Math.max(0, cvDelta * 12));
        leaks.push({ category: "Comps & Voids", score: cvScore, severity: cvScore > 50 ? "high" : cvScore > 15 ? "medium" : "low", title: "Comps, Voids & Discounts", desc: cv > 0 ? `At ${cv}% of sales, your comps/voids are ${cvDelta > 0 ? `running ${cvDelta.toFixed(1)}% above` : "within"} a healthy threshold.` : "Comps and voids are often a hidden leak. Enter your data above.", impact: rev * 4.33 * (Math.max(0, cvDelta) / 100) });
        const ticketOpportunity = ticket < 18 ? (18 - ticket) * (rev / Math.max(ticket, 1)) * 4.33 * 0.1 : 0;
        const toScore = Math.min(100, ticketOpportunity / 50);
        leaks.push({ category: "Revenue Optimization", score: toScore, severity: toScore > 40 ? "medium" : "low", title: "Revenue Per Guest", desc: ticket > 0 ? `Average ticket of $${ticket} ${ticket < 18 ? "leaves potential on the table — menu engineering and suggestive selling typically add $2–4 per cover." : "is in a healthy range."}` : "Enter your average ticket to evaluate revenue opportunities.", impact: ticketOpportunity });
      } else if (segment === "foodtruck") {
        const { weeklyRevenue, foodCost, fuelCommissary, eventsPerWeek, avgEventRevenue } = vals;
        const rev = parseFloat(weeklyRevenue) || 0;
        const fc = parseFloat(foodCost) || 0;
        const fuel = parseFloat(fuelCommissary) || 0;
        const events = parseFloat(eventsPerWeek) || 0;
        const eventRev = parseFloat(avgEventRevenue) || 0;
        const fcDelta = fc - BENCHMARKS.foodtruck.foodCostIdeal;
        const fcScore = Math.min(100, Math.max(0, fcDelta * 4));
        leaks.push({ category: "Food Cost", score: fcScore, severity: fcScore > 50 ? "high" : fcScore > 20 ? "medium" : "low", title: "Food Cost Leak", desc: fc > 0 ? `Food cost of ${fc}% is ${fcDelta > 0 ? `${fcDelta.toFixed(1)}% above` : "within"} the food truck benchmark of ${BENCHMARKS.foodtruck.foodCostIdeal}%.` : "Enter your food cost to analyze this area.", impact: rev * 4.33 * (Math.max(0, fcDelta) / 100) });
        const fuelBenchmark = rev * (BENCHMARKS.foodtruck.fuelCommissaryPct / 100);
        const fuelScore = fuel > 0 ? Math.min(100, Math.max(0, ((fuel - fuelBenchmark) / Math.max(fuelBenchmark, 1)) * 60)) : 0;
        leaks.push({ category: "Ops Overhead", score: fuelScore, severity: fuelScore > 50 ? "high" : fuelScore > 20 ? "medium" : "low", title: "Fuel & Commissary Overhead", desc: fuel > 0 ? `Weekly overhead of $${fuel} represents ${rev > 0 ? ((fuel / rev) * 100).toFixed(1) : "—"}% of revenue.` : "Enter your weekly fuel + commissary cost.", impact: Math.max(0, fuel - fuelBenchmark) * 4.33 });
        const eventGap = Math.max(0, BENCHMARKS.foodtruck.eventsPerWeekIdeal - events);
        const eventScore = Math.min(100, eventGap * 20);
        leaks.push({ category: "Event Volume", score: eventScore, severity: eventScore > 40 ? "medium" : "low", title: "Underutilized Schedule", desc: events > 0 ? `At ${events} events/week, there's room to reach the ${BENCHMARKS.foodtruck.eventsPerWeekIdeal}-event target.` : "Enter your average events per week.", impact: eventGap * (eventRev || rev / Math.max(events, 1)) * 4.33 });
        const revPerEvent = events > 0 && rev > 0 ? rev / events : eventRev;
        const revScore = revPerEvent > 0 && revPerEvent < 800 ? Math.min(100, (800 - revPerEvent) / 8) : 0;
        leaks.push({ category: "Revenue Per Event", score: revScore, severity: revScore > 50 ? "high" : revScore > 25 ? "medium" : "low", title: "Revenue Per Event", desc: revPerEvent > 0 ? `Average of ~$${Math.round(revPerEvent)}/event ${revPerEvent < 600 ? "is below the $600–$800 healthy range." : "is solid."}` : "Enter weekly revenue and events to estimate this.", impact: revPerEvent > 0 && events > 0 ? Math.max(0, (800 - revPerEvent)) * events * 4.33 * 0.15 : 0 });
      } else {
        const { monthlyRevenue, foodCost, laborCost, inquiryConversion, avgEventSize, pricePerHead } = vals;
        const rev = parseFloat(monthlyRevenue) || 0;
        const fc = parseFloat(foodCost) || 0;
        const lc = parseFloat(laborCost) || 0;
        const conv = parseFloat(inquiryConversion) || 0;
        const size = parseFloat(avgEventSize) || 0;
        const price = parseFloat(pricePerHead) || 0;
        const fcDelta = fc - BENCHMARKS.catering.foodCostIdeal;
        const fcScore = Math.min(100, Math.max(0, fcDelta * 4));
        leaks.push({ category: "Food Cost", score: fcScore, severity: fcScore > 50 ? "high" : fcScore > 20 ? "medium" : "low", title: "Food Cost Leak", desc: fc > 0 ? `Food cost of ${fc}% is ${fcDelta > 0 ? `${fcDelta.toFixed(1)}% above` : "within"} the catering benchmark of ${BENCHMARKS.catering.foodCostIdeal}%.` : "Enter your food cost % to analyze.", impact: rev * 12 * (Math.max(0, fcDelta) / 100) });
        const lcDelta = lc - BENCHMARKS.catering.laborIdeal;
        const lcScore = Math.min(100, Math.max(0, lcDelta * 4));
        leaks.push({ category: "Labor Efficiency", score: lcScore, severity: lcScore > 50 ? "high" : lcScore > 20 ? "medium" : "low", title: "Labor Overrun", desc: lc > 0 ? `Labor at ${lc}% vs benchmark of ${BENCHMARKS.catering.laborIdeal}% — ${lcDelta > 0 ? `you're leaving ${lcDelta.toFixed(1)}% on the table.` : "looks solid."}` : "Enter your labor % to analyze.", impact: rev * 12 * (Math.max(0, lcDelta) / 100) });
        const convDelta = BENCHMARKS.catering.conversionIdeal - conv;
        const convScore = conv > 0 ? Math.min(100, Math.max(0, convDelta * 2)) : 0;
        leaks.push({ category: "Lead Conversion", score: convScore, severity: convScore > 50 ? "high" : convScore > 25 ? "medium" : "low", title: "Inquiry Conversion Rate", desc: conv > 0 ? `Closing ${conv}% of inquiries ${conv < BENCHMARKS.catering.conversionIdeal ? `is ${convDelta.toFixed(0)}% below the 65% benchmark.` : "is above average."}` : "Enter your conversion rate to evaluate this leak.", impact: conv > 0 && rev > 0 ? (convDelta / 100) * rev * (100 / Math.max(conv, 1)) * 12 * 0.2 : 0 });
        const priceScore = price > 0 && size > 0 ? Math.min(100, Math.max(0, (45 - price) * 3)) : 0;
        leaks.push({ category: "Pricing", score: priceScore, severity: priceScore > 50 ? "high" : priceScore > 25 ? "medium" : "low", title: "Per-Head Pricing", desc: price > 0 ? `At $${price}/head ${price < 35 ? "you may be under-pricing relative to your costs and market." : price < 45 ? "you're in a competitive range but there's room to move up." : "your pricing is healthy."}` : "Enter your average price per head to evaluate.", impact: price > 0 && size > 0 && price < 45 ? (45 - price) * size * (rev / Math.max(price * size, 1) / 12) * 12 : 0 });
      }
      if (segment === "contractor") {
        const { monthlyRevenue, laborCost, materialsCost, overhead, avgJobValue, unbilledHours } = vals;
        const rev = parseFloat(monthlyRevenue) || 0;
        const lc = parseFloat(laborCost) || 0;
        const mc = parseFloat(materialsCost) || 0;
        const ov = parseFloat(overhead) || 0;
        const jobVal = parseFloat(avgJobValue) || 0;
        const unbilled = parseFloat(unbilledHours) || 0;

        const lcDelta = lc - BENCHMARKS.contractor.laborIdeal;
        const lcScore = Math.min(100, Math.max(0, lcDelta * 3));
        leaks.push({ category: "Labor Cost", score: lcScore, severity: lcScore > 50 ? "high" : lcScore > 20 ? "medium" : "low", title: "Labor Cost Overrun", desc: lc > 0 ? `Labor at ${lc}% is ${lcDelta > 0 ? `${lcDelta.toFixed(1)}% above` : "within"} the ${BENCHMARKS.contractor.laborIdeal}% benchmark for trades.` : "Enter your labor % to analyze.", impact: rev * 12 * (Math.max(0, lcDelta) / 100) });

        const mcDelta = mc - BENCHMARKS.contractor.materialsIdeal;
        const mcScore = Math.min(100, Math.max(0, mcDelta * 3));
        leaks.push({ category: "Materials Cost", score: mcScore, severity: mcScore > 50 ? "high" : mcScore > 20 ? "medium" : "low", title: "Materials & Subcontractor Cost", desc: mc > 0 ? `Materials at ${mc}% ${mcDelta > 0 ? `is running ${mcDelta.toFixed(1)}% over the ${BENCHMARKS.contractor.materialsIdeal}% benchmark — supplier pricing or scope creep may be the issue.` : "looks healthy."}` : "Enter your materials cost % to analyze.", impact: rev * 12 * (Math.max(0, mcDelta) / 100) });

        const ovDelta = ov - BENCHMARKS.contractor.overheadIdeal;
        const ovScore = Math.min(100, Math.max(0, ovDelta * 4));
        leaks.push({ category: "Overhead", score: ovScore, severity: ovScore > 50 ? "high" : ovScore > 20 ? "medium" : "low", title: "Overhead Bloat", desc: ov > 0 ? `Overhead at ${ov}% ${ovDelta > 0 ? `is ${ovDelta.toFixed(1)}% above the ${BENCHMARKS.contractor.overheadIdeal}% target. Equipment costs, insurance, and admin are worth reviewing.` : "is within range."}` : "Enter your overhead % to analyze.", impact: rev * 12 * (Math.max(0, ovDelta) / 100) });

        const unbilledScore = unbilled > 0 ? Math.min(100, unbilled * 8) : 0;
        const unbilledImpact = unbilled > 0 && jobVal > 0 ? unbilled * 4.33 * (jobVal / 40) * 12 * 0.5 : 0;
        leaks.push({ category: "Unbilled Time", score: unbilledScore, severity: unbilledScore > 50 ? "high" : unbilledScore > 20 ? "medium" : "low", title: "Unbilled Hours", desc: unbilled > 0 ? `${unbilled} unbilled hours per week is direct revenue leaking out. At your job rate, that adds up fast — better job costing and time tracking can recover this.` : "Enter unbilled hours to evaluate this leak.", impact: unbilledImpact });
      }

      if (segment === "retail") {
        const { monthlyRevenue, cogs, laborCost, shrink, avgTransaction, returnsRate } = vals;
        const rev = parseFloat(monthlyRevenue) || 0;
        const cg = parseFloat(cogs) || 0;
        const lc = parseFloat(laborCost) || 0;
        const sh = parseFloat(shrink) || 0;
        const tx = parseFloat(avgTransaction) || 0;
        const ret = parseFloat(returnsRate) || 0;

        const cogsDelta = cg - BENCHMARKS.retail.cogsIdeal;
        const cogsScore = Math.min(100, Math.max(0, cogsDelta * 3));
        leaks.push({ category: "Cost of Goods", score: cogsScore, severity: cogsScore > 50 ? "high" : cogsScore > 20 ? "medium" : "low", title: "Gross Margin Leak", desc: cg > 0 ? `COGS at ${cg}% ${cogsDelta > 0 ? `is above the ${BENCHMARKS.retail.cogsIdeal}% benchmark — pricing, vendor terms, or product mix may be compressing your margin.` : "looks healthy."}` : "Enter your cost of goods % to analyze.", impact: rev * 12 * (Math.max(0, cogsDelta) / 100) });

        const lcDelta = lc - BENCHMARKS.retail.laborIdeal;
        const lcScore = Math.min(100, Math.max(0, lcDelta * 4));
        leaks.push({ category: "Labor Efficiency", score: lcScore, severity: lcScore > 50 ? "high" : lcScore > 20 ? "medium" : "low", title: "Labor Cost", desc: lc > 0 ? `Labor at ${lc}% vs the ${BENCHMARKS.retail.laborIdeal}% retail benchmark. ${lcDelta > 0 ? "Scheduling and hours management are the first levers." : "Looking solid."}` : "Enter your labor % to analyze.", impact: rev * 12 * (Math.max(0, lcDelta) / 100) });

        const shrinkDelta = sh - BENCHMARKS.retail.shrinkIdeal;
        const shrinkScore = Math.min(100, Math.max(0, shrinkDelta * 20));
        leaks.push({ category: "Shrink", score: shrinkScore, severity: shrinkScore > 50 ? "high" : shrinkScore > 20 ? "medium" : "low", title: "Shrink & Loss", desc: sh > 0 ? `Shrink at ${sh}% ${shrinkDelta > 0 ? `is above the ${BENCHMARKS.retail.shrinkIdeal}% industry average — theft prevention, receiving procedures, and inventory counts are worth reviewing.` : "is within a healthy range."}` : "Enter your shrink % to analyze.", impact: rev * 12 * (Math.max(0, shrinkDelta) / 100) });

        const retScore = ret > 0 ? Math.min(100, ret * 5) : 0;
        leaks.push({ category: "Returns", score: retScore, severity: retScore > 50 ? "high" : retScore > 20 ? "medium" : "low", title: "Returns Rate", desc: ret > 0 ? `Returns at ${ret}% ${ret > 5 ? "is worth investigating — product quality, customer expectation setting, and return policy friction all play a role." : "is manageable but worth monitoring."}` : "Enter your returns rate to evaluate.", impact: rev * 12 * (ret / 100) * 0.5 });
      }

      const overallScore = Math.round(leaks.reduce((a, l) => a + l.score, 0) / leaks.length);
      const totalImpact = leaks.reduce((a, l) => a + l.impact, 0);
      return { leaks, overallScore, totalImpact };
    }

    function getVerdict(score) {
      if (score >= 70) return { label: "Critical Leaks Detected", color: "#C0392B", ring: "#C0392B" };
      if (score >= 45) return { label: "Significant Leaks Found", color: "#D4910A", ring: "#D4910A" };
      if (score >= 20) return { label: "Minor Leaks Present", color: "#2D7A4F", ring: "#4A8C6A" };
      return { label: "Healthy Operation", color: "#2D7A4F", ring: "#4A8C6A" };
    }

    function getLeakColor(severity) {
      if (severity === "high") return "#C0392B";
      if (severity === "medium") return "#D4910A";
      return "#2D7A4F";
    }

    function fmt(n) {
      return n >= 1000 ? `$${(n / 1000).toFixed(0)}k` : `$${Math.round(n)}`;
    }

    function App() {
      const [step, setStep] = useState(0);
      const [segment, setSegment] = useState(null);
      const [vals, setVals] = useState({});
      const [email, setEmail] = useState("");
      const [emailName, setEmailName] = useState("");
      const [result, setResult] = useState(null);
      const [barWidths, setBarWidths] = useState([]);

      const steps = ["Business Type", "Your Numbers", "Get Results", "Your Report"];

      useEffect(() => {
        if (step === 3 && result) {
          setTimeout(() => setBarWidths(result.leaks.map(l => l.score)), 200);
        }
      }, [step, result]);

      const canProceedStep1 = !!segment;
      const canProceedStep2 = segment && FIELDS[segment].filter(f => !["seatingCapacity", "avgEventSize"].includes(f.key)).some(f => parseFloat(vals[f.key]) > 0);

      function handleReveal() {
        if (!email.includes("@")) return;
        const r = calcScore(segment, vals);
        setResult(r);
        setStep(3);
      }

      return (
        <div className="app">
          <div className="header">
            <div className="header-logo">Tre Coleman Consulting</div>
            <div className="header-sub">Internal Tool</div>
          </div>

          {step === 0 && (
            <div className="hero">
              <div className="hero-eyebrow">Internal · Diagnostic Tool</div>
              <h1>Find the <span>Profit Leaks</span></h1>
              <p className="hero-sub">Enter a client's numbers to calculate their Profit Leak Score.</p>
            </div>
          )}
          {step > 0 && (
            <div className="hero" style={{padding: "28px 32px 24px"}}>
              <h1 style={{fontSize: "1.4rem", marginBottom: 0}}>Profit Leak <span>Score Calculator</span></h1>
            </div>
          )}

          <div className="progress-wrap">
            <div className="progress-steps">
              {steps.map((s, i) => (
                <div key={i} className={`p-step ${i === step ? "active" : i < step ? "done" : ""}`}>
                  <div className="p-dot">{i < step ? "✓" : i + 1}</div>
                  <div className="p-label">{s}</div>
                </div>
              ))}
            </div>
          </div>

          {step === 0 && (
            <div className="card">
              <div className="card-title">What type of operation?</div>
              <p className="card-sub">Select the business model to calibrate benchmarks.</p>
              <div className="segments">
                {Object.entries(SEGMENT_INFO).map(([key, info]) => (
                  <button key={key} className={`seg-btn ${segment === key ? "selected" : ""}`} onClick={() => setSegment(key)}>
                    <span className="seg-icon">{info.icon}</span>
                    <div className="seg-label">{info.label}</div>
                    <div className="seg-desc">{info.desc}</div>
                  </button>
                ))}
              </div>
              <div className="btn-row">
                <div />
                <button className="btn-primary" disabled={!canProceedStep1} onClick={() => setStep(1)}>Continue &rarr;</button>
              </div>
            </div>
          )}

          {step === 1 && segment && (
            <div className="card">
              <div className="card-title">Enter the numbers</div>
              <p className="card-sub">Use the client's most recent 30-day averages.</p>
              <div className="input-grid">
                {FIELDS[segment].map((field) => (
                  <div key={field.key} className="input-group">
                    <div className="input-label">{field.label}</div>
                    <div className="input-wrap">
                      {field.prefix && <span className="input-prefix">{field.prefix}</span>}
                      <input type="number" min="0" placeholder="0" value={vals[field.key] || ""} onChange={e => setVals(v => ({ ...v, [field.key]: e.target.value }))} />
                      {field.suffix && <span className="input-suffix">{field.suffix}</span>}
                    </div>
                    <div className="input-hint">{field.hint}</div>
                  </div>
                ))}
              </div>
              <div className="btn-row">
                <button className="btn-ghost" onClick={() => setStep(0)}>&larr; Back</button>
                <button className="btn-primary" disabled={!canProceedStep2} onClick={() => setStep(2)}>Calculate &rarr;</button>
              </div>
            </div>
          )}

          {step === 2 && (
            <div className="card">
              <div className="gate-wrap">
                <div className="score-teaser">
                  <div className="score-blur-label">Profit Leak Score</div>
                  <div className="score-blur-number">74</div>
                  <div className="score-blur-sub">Calculating results...</div>
                  <div className="lock-icon">🔒</div>
                </div>
                <div className="gate-headline">Score is ready.</div>
                <p className="gate-sub">Enter a name to personalize the report.</p>
                <div style={{display:"flex", flexDirection:"column", gap:10, maxWidth:420, margin:"0 auto 8px"}}>
                  <input className="email-input" type="text" placeholder="Client first name (or your name)" value={emailName} onChange={e => setEmailName(e.target.value)} />
                  <div className="email-row" style={{margin:0}}>
                    <input className="email-input" type="email" placeholder="Email (optional)" value={email} onChange={e => setEmail(e.target.value)} />
                    <button className="btn-primary" onClick={handleReveal}>Show Score</button>
                  </div>
                </div>
              </div>
              <div className="btn-row" style={{marginTop:20}}>
                <button className="btn-ghost" onClick={() => setStep(1)}>&larr; Edit Numbers</button>
              </div>
            </div>
          )}

          {step === 3 && result && (() => {
            const verdict = getVerdict(result.overallScore);
            return (
              <div className="card">
                <div className="score-ring-wrap">
                  <div className="score-ring">
                    <svg width="140" height="140" viewBox="0 0 140 140">
                      <circle cx="70" cy="70" r="58" fill="none" stroke="#EDE7D6" strokeWidth="10" />
                      <circle cx="70" cy="70" r="58" fill="none" stroke={verdict.ring} strokeWidth="10" strokeDasharray={`${(result.overallScore / 100) * 364.4} 364.4`} strokeLinecap="round" />
                    </svg>
                    <div className="score-center">
                      <div className="score-number" style={{color: verdict.color}}>{result.overallScore}</div>
                      <div className="score-label-sm">/ 100</div>
                    </div>
                  </div>
                  <div className="score-verdict">{verdict.label}</div>
                  <p className="score-verdict-sub">{emailName ? `${emailName}, here's` : "Here's"} what the numbers reveal.</p>
                </div>

                {result.totalImpact > 100 && (
                  <div className="dollar-box">
                    <div className="dollar-icon">💸</div>
                    <div className="dollar-content">
                      <div className="dollar-label">Est. Annual Recoverable Profit</div>
                      <div className="dollar-amount">{fmt(result.totalImpact)}</div>
                      <div className="dollar-sub">Based on inputs vs. industry benchmarks</div>
                    </div>
                  </div>
                )}

                <div className="leak-bars">
                  {result.leaks.map((leak, i) => (
                    <div key={i} className="leak-bar-item">
                      <div className="leak-bar-label">{leak.category}</div>
                      <div className="leak-bar-track">
                        <div className="leak-bar-fill" style={{width: `${barWidths[i] || 0}%`, background: getLeakColor(leak.severity)}} />
                      </div>
                      <div className="leak-bar-pct" style={{color: getLeakColor(leak.severity)}}>{Math.round(leak.score)}</div>
                    </div>
                  ))}
                </div>

                <div className="leaks-detail">
                  <div className="leak-detail-title">Leak Breakdown</div>
                  {result.leaks.sort((a, b) => b.score - a.score).map((leak, i) => (
                    <div key={i} className={`leak-item ${leak.severity}`}>
                      <div className={`leak-dot ${leak.severity}`} />
                      <div>
                        <div className="leak-text-title">{leak.title}</div>
                        <div className="leak-text-desc">{leak.desc}</div>
                        {leak.impact > 50 && <div className="leak-text-impact">Est. impact: {fmt(leak.impact)}/yr</div>}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="btn-row">
                  <button className="btn-ghost" onClick={() => { setStep(0); setSegment(null); setVals({}); setEmail(""); setEmailName(""); setResult(null); setBarWidths([]); }}>Start Over</button>
                  <button className="btn-primary" onClick={() => setStep(1)}>&larr; Edit Numbers</button>
                </div>
              </div>
            );
          })()}

          <div className="footer">
            <p>Tre Coleman Consulting &middot; Internal Use Only</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
